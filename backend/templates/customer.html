<!DOCTYPE html>
<html>
<head>
    <title>Customer Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='customer.css') }}">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🍽 Restaurant</h2>

        <button onclick="showSection('menu', this)" class="active">Menu</button>
        <button onclick="showSection('orders', this)">Orders</button>
        <button onclick="showSection('profile', this)">Profile</button>
        <button onclick="showSection('payment', this)">Payments</button>
        <button onclick="showSection('reviews', this)">Reviews</button>

        <button onclick="logout()">Logout</button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <!-- MENU SECTION -->
        <div id="menu-section">
            <h1>Restaurant Menu</h1>
            <div id="menu-container"></div>
        </div>

        <!-- ORDERS SECTION -->
        <div id="orders-section" style="display:none;">
            <h1>Orders</h1>
            <div id="orders-list"></div>
        </div>

        <!-- PROFILE SECTION -->
        <div id="profile-section" style="display:none;">
    <h1>Profile</h1>

    <div class="profile-card">
        <p><strong>Name:</strong> <span id="profile-name"></span></p>
        <p><strong>Phone:</strong> <span id="profile-phone"></span></p>
    </div>
</div>

        <!-- PAYMENT SECTION -->
        <div id="payment-section" style="display:none;">
            <h1>Bill / Payment</h1>

            <div class="payment-box">
                <h3>🧾 Order Summary</h3>

                <div id="bill-items"></div>

                <h2>Total: ₹<span id="bill-total">0</span></h2>
            </div>
        </div>

        <div id="reviews-section" style="display:none;">
    <h1>Reviews</h1>

    <div class="review-box">
        <textarea id="review-text" placeholder="Write your review..."></textarea>
        <select id="rating">
            <option value="5">⭐⭐⭐⭐⭐</option>
            <option value="4">⭐⭐⭐⭐</option>
            <option value="3">⭐⭐⭐</option>
            <option value="2">⭐⭐</option>
            <option value="1">⭐</option>
        </select>

        <button onclick="submitReview()">Submit Review</button>
    </div>

    <div id="reviews-list"></div>
</div>

    </div> <!-- ✅ MAIN CLOSED -->

    <!-- CART PANEL (RIGHT SIDE) -->
    <div class="cart-panel">
        <h2>🛒 Your Cart</h2>
        <ul id="cart-items"></ul>
        <h3 id="total">Total: ₹0</h3>
        <button onclick="placeOrder()">Confirm Order</button>
    </div>

</div> <!-- ✅ CONTAINER CLOSED -->

<script src="{{ url_for('static', filename='customer.js') }}"></script>

</body>
</html>
